<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vortex — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Outfit',sans-serif;
  background:#020206;color:#e8e8f0;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.bg-scene{position:fixed;inset:0;z-index:0;background:#020206;}
#ribbon-canvas{position:absolute;inset:0;width:100%;height:100%;}

.grain{
  position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.25;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}
.vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 68% 68% at 50% 50%,transparent 20%,rgba(2,2,6,0.72) 100%);
}

/* ═══ CARD ═══ */
.login-wrap{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  opacity:0;animation:cardIn .9s .3s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes cardIn{
  0%{opacity:0;transform:translateY(30px) scale(0.96);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
.card{
  width:380px;max-width:92vw;
  background:rgba(8,8,14,0.78);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:20px;
  padding:40px 32px 32px;
  backdrop-filter:blur(44px) saturate(1.2);
  -webkit-backdrop-filter:blur(44px) saturate(1.2);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 24px 80px rgba(0,0,0,0.65),
    0 0 80px rgba(80,80,160,0.04),
    inset 0 1px 0 rgba(255,255,255,0.05);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(180,180,255,0.3),transparent);
}
.card::after{
  content:'';position:absolute;top:-55%;left:50%;transform:translateX(-50%);
  width:180%;height:90%;border-radius:50%;
  background:radial-gradient(ellipse,rgba(100,100,200,0.04),transparent 65%);
  pointer-events:none;
}

.logo-area{text-align:center;margin-bottom:28px;position:relative;z-index:1;}
.logo-area svg{width:48px;height:48px;filter:drop-shadow(0 0 18px rgba(180,180,255,0.2));opacity:0;animation:logoIn .6s .6s ease forwards;}
@keyframes logoIn{0%{opacity:0;transform:scale(0.8);}100%{opacity:1;transform:scale(1);}}
.logo-name{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:800;letter-spacing:4px;margin-top:10px;color:#e8e8f0;opacity:0;animation:fadeUp .5s .75s ease forwards;}
.logo-sub{font-size:.58rem;letter-spacing:2.5px;color:rgba(255,255,255,0.5);text-transform:uppercase;margin-top:3px;opacity:0;animation:fadeUp .5s .85s ease forwards;}
@keyframes fadeUp{0%{opacity:0;transform:translateY(8px);}100%{opacity:1;transform:translateY(0);}}

.discord-btn{
  position:relative;z-index:1;width:100%;padding:14px;margin-bottom:24px;
  background:#5865F2;border:none;border-radius:12px;
  color:#fff;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;
  letter-spacing:.3px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .3s cubic-bezier(0.25,0.46,0.45,0.94);
  box-shadow:0 4px 20px rgba(88,101,242,0.28);
  opacity:0;animation:fadeUp .5s .95s ease forwards;overflow:hidden;
}
.discord-btn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:none;}
.discord-btn:hover::after{left:120%;transition:left .6s ease;}
.discord-btn:hover{background:#4752c4;transform:translateY(-3px) scale(1.02);box-shadow:0 8px 32px rgba(88,101,242,0.48),0 0 18px rgba(88,101,242,0.2);}
.discord-btn:hover svg{animation:discordWiggle .5s ease;}
.discord-btn:active{transform:translateY(0) scale(0.98);}
@keyframes discordWiggle{0%{transform:rotate(0);}20%{transform:rotate(-8deg);}40%{transform:rotate(8deg);}60%{transform:rotate(-5deg);}80%{transform:rotate(3deg);}100%{transform:rotate(0);}}
.discord-btn svg{transition:transform .2s;}

.info-section{position:relative;z-index:1;margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.06);opacity:0;animation:fadeUp .5s 1.05s ease forwards;}
.info-label{font-size:.54rem;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.45);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.info-label svg{width:12px;height:12px;opacity:.6;}
.info-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.info-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 8px;text-align:center;transition:border-color .2s;}
.info-card:hover{border-color:rgba(180,180,255,0.25);}
.info-card-icon{font-size:1.1rem;margin-bottom:5px;opacity:.8;}
.info-card-text{font-size:.54rem;letter-spacing:1.5px;color:rgba(255,255,255,0.55);text-transform:uppercase;font-weight:500;}

.login-footer{text-align:center;margin-top:28px;opacity:0;animation:fadeUp .5s 1.15s ease forwards;}
.login-footer a{font-size:.6rem;color:rgba(255,255,255,0.4);text-decoration:none;letter-spacing:1.2px;transition:color .2s;margin:0 10px;font-weight:500;}
.login-footer a:hover{color:rgba(255,255,255,0.8);}
.login-footer .copy{display:block;font-size:.52rem;color:rgba(255,255,255,0.25);letter-spacing:1.5px;margin-top:12px;font-weight:400;}

@media(max-width:480px){.card{padding:32px 22px 26px;border-radius:16px;}}
</style>
</head>
<body>

<div class="bg-scene"><canvas id="ribbon-canvas"></canvas></div>
<div class="vignette"></div>
<div class="grain"></div>

<div class="login-wrap">
  <div class="card">
    <div class="logo-area">
      <svg viewBox="0 0 200 200" fill="none">
        <circle cx="100" cy="100" r="90" stroke="white" stroke-width="7" opacity=".9"/>
        <path d="M45 48 L72 48 L100 118 L128 48 L155 48 L100 158 Z" fill="white" opacity=".95"/>
        <path d="M45 48 L62 48 L68 62 L55 82 Z" fill="#020206"/>
        <path d="M155 48 L138 48 L132 62 L145 82 Z" fill="#020206"/>
      </svg>
      <div class="logo-name">VORTEX</div>
      <div class="logo-sub">Secure Access Portal</div>
    </div>

    <button class="discord-btn" onclick="window.open('https://discord.gg/zUMUBXHbJ2','_blank')">
      <svg viewBox="0 0 127.14 96.36" fill="currentColor" style="width:22px;height:22px"><path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0 105.89 105.89 0 0 0 19.39 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2.04a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2.04a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15ZM42.45 65.69C36.18 65.69 31 60 31 53.05s5-12.68 11.45-12.68S54 46.07 53.89 53.05 48.84 65.69 42.45 65.69Zm42.24 0C78.41 65.69 73.25 60 73.25 53.05s5-12.68 11.44-12.68S96.23 46.07 96.12 53.05 91.08 65.69 84.69 65.69Z"/></svg>
      Continue with Discord
    </button>

    <div class="info-section">
      <div class="info-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        Secure Connection
      </div>
      <div class="info-cards">
        <div class="info-card"><div class="info-card-icon">🔐</div><div class="info-card-text">Encrypted</div></div>
        <div class="info-card"><div class="info-card-icon">🛡️</div><div class="info-card-text">Protected</div></div>
        <div class="info-card"><div class="info-card-icon">⚡</div><div class="info-card-text">Real-time</div></div>
      </div>
    </div>
  </div>

  <div class="login-footer">
    <a href="#">Terms</a>
    <a href="#">Privacy</a>
    <a href="https://discord.gg/zUMUBXHbJ2" target="_blank">Support</a>
    <span class="copy">© 2026 VORTEX ANTICHEAT — SECURE SYSTEMS</span>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('ribbon-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /*
   * Each ribbon definition:
   *  yBase  – vertical center (0–1 of screen height)
   *  amp    – vertical wave amplitude (fraction of H)
   *  freq   – how many full wave cycles across screen
   *  speed  – animation rate
   *  phase  – starting phase offset
   *  thick  – ribbon thickness (fraction of H)
   *  twistF – secondary freq for the twist modulation
   *  layer  – 'back' | 'mid' | 'front'  (draw order + brightness)
   */
  const ribbons = [
    // ── back layer (widest, softest) ──────────────────
    { yBase:.65, amp:.20, freq:.50, speed:.000055, phase:0.0,  thick:.28, twistF:2.8, layer:'back'  },
    { yBase:.35, amp:.18, freq:.45, speed:.000048, phase:3.2,  thick:.24, twistF:3.1, layer:'back'  },
    { yBase:.80, amp:.16, freq:.55, speed:.000062, phase:1.7,  thick:.20, twistF:2.5, layer:'back'  },
    { yBase:.20, amp:.15, freq:.42, speed:.000040, phase:5.1,  thick:.18, twistF:3.4, layer:'back'  },

    // ── mid layer ─────────────────────────────────────
    { yBase:.55, amp:.22, freq:.60, speed:.000080, phase:2.4,  thick:.16, twistF:3.8, layer:'mid'   },
    { yBase:.42, amp:.25, freq:.65, speed:.000092, phase:4.8,  thick:.14, twistF:4.2, layer:'mid'   },
    { yBase:.72, amp:.18, freq:.58, speed:.000070, phase:1.1,  thick:.15, twistF:3.5, layer:'mid'   },
    { yBase:.28, amp:.20, freq:.52, speed:.000085, phase:6.0,  thick:.13, twistF:4.0, layer:'mid'   },

    // ── front layer (sharpest highlights) ────────────
    { yBase:.50, amp:.28, freq:.70, speed:.000115, phase:0.8,  thick:.09, twistF:5.0, layer:'front' },
    { yBase:.60, amp:.24, freq:.75, speed:.000130, phase:3.6,  thick:.08, twistF:5.5, layer:'front' },
    { yBase:.38, amp:.26, freq:.68, speed:.000108, phase:2.0,  thick:.10, twistF:4.8, layer:'front' },
  ];

  // brightness config per layer
  const layerConfig = {
    back : { peak:.10, edge:.00, specular:.06, reflAlpha:.018 },
    mid  : { peak:.16, edge:.00, specular:.11, reflAlpha:.030 },
    front: { peak:.30, edge:.00, specular:.22, reflAlpha:.050 },
  };

  const STEPS = 160; // segments per ribbon – higher = smoother

  function buildRibbon(r, ts){
    const t = ts * r.speed;
    const cfg = layerConfig[r.layer];
    const halfH = r.thick * H * 0.5;

    const top = [], bot = [];

    for(let i = 0; i <= STEPS; i++){
      const nx  = i / STEPS;
      const waveY = Math.sin(nx * Math.PI * 2 * r.freq + t * 60 + r.phase);
      const cy  = (r.yBase + waveY * r.amp) * H;

      // Twist = the ribbon rolls so apparent width varies sinusoidally
      const twist  = Math.sin(nx * Math.PI * 2 * r.twistF + t * 45 + r.phase * 1.4);
      const hw     = halfH * (0.15 + 0.85 * Math.abs(twist)); // never fully flat

      top.push({ x: nx * W, y: cy - hw, twist });
      bot.push({ x: nx * W, y: cy + hw, twist });
    }

    // Draw back-face first (darker), then front-face (brighter) using twist sign
    for(let pass = 0; pass < 2; pass++){
      for(let i = 0; i < STEPS; i++){
        const t0 = top[i], t1 = top[i+1];
        const b0 = bot[i], b1 = bot[i+1];

        // Average twist across the quad
        const twistAvg = (t0.twist + t1.twist) * 0.5;
        const facing   = twistAvg >= 0 ? 1 : -1; // which face is toward viewer

        // pass 0 = back face, pass 1 = front face
        if(pass === 0 && facing > 0) continue;
        if(pass === 1 && facing < 0) continue;

        // Light value: brightest when nearly flat (twist ≈ 0 → ribbon edge on)
        // or at peak of roll (twist ≈ ±1)
        const absT    = Math.abs(twistAvg);
        // specular highlight when the surface normal points toward viewer (absT near 0 for edge-on twist)
        const spec    = Math.pow(1 - absT, 3.5);
        const diffuse = absT * 0.7 + 0.3;

        const faceBright = pass === 1
          ? cfg.peak  * diffuse + cfg.specular * spec
          : cfg.peak  * diffuse * 0.25;

        // gradient across ribbon width (top-to-bottom)
        const gx = (t0.x + b0.x) * 0.5;
        const grad = ctx.createLinearGradient(gx, t0.y, gx, b0.y);
        grad.addColorStop(0,    `rgba(255,255,255,0)`);
        grad.addColorStop(0.18, `rgba(255,255,255,${faceBright * 0.4})`);
        grad.addColorStop(0.45, `rgba(255,255,255,${faceBright})`);
        grad.addColorStop(0.55, `rgba(255,255,255,${faceBright})`);
        grad.addColorStop(0.82, `rgba(255,255,255,${faceBright * 0.4})`);
        grad.addColorStop(1,    `rgba(255,255,255,0)`);

        ctx.beginPath();
        ctx.moveTo(t0.x, t0.y);
        ctx.lineTo(t1.x, t1.y);
        ctx.lineTo(b1.x, b1.y);
        ctx.lineTo(b0.x, b0.y);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // ── specular streak along the spine ──
        if(pass === 1 && spec > 0.15){
          const sy0 = (t0.y + b0.y) * 0.5;
          const sy1 = (t1.y + b1.y) * 0.5;
          ctx.beginPath();
          ctx.moveTo(t0.x, sy0);
          ctx.lineTo(t1.x, sy1);
          ctx.strokeStyle = `rgba(255,255,255,${spec * cfg.specular * 1.4})`;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      }
    }

    // ── soft reflection below ribbon ──
    const cfg2 = cfg;
    ctx.save();
    ctx.globalAlpha = cfg2.reflAlpha;
    for(let i = 0; i < STEPS; i++){
      const b0 = bot[i], b1 = bot[i+1];
      const reflY0 = b0.y + (b0.y - top[i].y) * 0.35;
      const reflY1 = b1.y + (b1.y - top[i+1].y) * 0.35;

      const gx = (b0.x + b1.x) * 0.5;
      const refGrad = ctx.createLinearGradient(gx, b0.y, gx, reflY0);
      refGrad.addColorStop(0,   'rgba(255,255,255,0.4)');
      refGrad.addColorStop(1,   'rgba(255,255,255,0)');

      ctx.beginPath();
      ctx.moveTo(b0.x, b0.y);
      ctx.lineTo(b1.x, b1.y);
      ctx.lineTo(b1.x, reflY1);
      ctx.lineTo(b0.x, reflY0);
      ctx.closePath();
      ctx.fillStyle = refGrad;
      ctx.fill();
    }
    ctx.restore();
  }

  function frame(ts){
    // Motion-blur trail: semi-transparent fill instead of clearRect
    ctx.fillStyle = 'rgba(2,2,6,0.72)';
    ctx.fillRect(0, 0, W, H);

    // Draw layers back → front
    for(const r of ribbons.filter(r => r.layer === 'back'))  buildRibbon(r, ts);
    for(const r of ribbons.filter(r => r.layer === 'mid'))   buildRibbon(r, ts);
    for(const r of ribbons.filter(r => r.layer === 'front')) buildRibbon(r, ts);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
